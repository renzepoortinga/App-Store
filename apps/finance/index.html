<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Grip — Financieel dashboard</title>
<meta name="description" content="Persoonlijk financieel dashboard. Upload je bankafschriften, krijg inzicht en een plan om financieel gezond te worden. Alle data blijft op je apparaat.">
<meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Grip">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" href="icons/icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<style>
/* ============ Apple HIG design tokens ============ */
:root {
  --bg: #f2f2f7;                        /* systemGroupedBackground */
  --card: #ffffff;                      /* secondarySystemGroupedBackground */
  --card2: #f2f2f7;
  --label: #000000;
  --secondary-label: rgba(60,60,67,.6);
  --tertiary-label: rgba(60,60,67,.3);
  --separator: rgba(60,60,67,.29);
  --accent: #007aff;
  --fill: rgba(120,120,128,.16);
  --green: #248a3d;                     /* systemGreen (text-safe) */
  --red: #d70015;                       /* systemRed (text-safe) */
  --orange-text: #c93400;
  /* chart tokens (validated palette, light) */
  --series-in: #2a78d6;                 /* inkomen */
  --series-out: #eb6834;                /* uitgaven */
  --div-pos: #2a78d6;
  --div-neg: #e34948;
  --seq: #2a78d6;
  --meter-track: #cde2fb;
  --grid: #e1e0d9;
  --axis: #c3c2b7;
  --muted-ink: #898781;
  --tab-bg: rgba(249,249,249,.94);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #000000;
    --card: #1c1c1e;
    --card2: #2c2c2e;
    --label: #ffffff;
    --secondary-label: rgba(235,235,245,.6);
    --tertiary-label: rgba(235,235,245,.3);
    --separator: rgba(84,84,88,.6);
    --accent: #0a84ff;
    --fill: rgba(120,120,128,.32);
    --green: #30d158;
    --red: #ff453a;
    --orange-text: #ff9f0a;
    /* chart tokens (validated palette, dark) */
    --series-in: #3987e5;
    --series-out: #d95926;
    --div-pos: #3987e5;
    --div-neg: #e66767;
    --seq: #3987e5;
    --meter-track: #184f95;
    --grid: #2c2c2a;
    --axis: #383835;
    --muted-ink: #898781;
    --tab-bg: rgba(22,22,24,.94);
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, "Segoe UI", sans-serif;
  background: var(--bg); color: var(--label);
  -webkit-font-smoothing: antialiased;
  padding-bottom: calc(64px + env(safe-area-inset-bottom));
}
.wrap { max-width: 760px; margin: 0 auto; padding: 0 16px; }
header.app { padding: calc(14px + env(safe-area-inset-top)) 0 6px; }
h1 { font-size: 34px; font-weight: 700; letter-spacing: .37px; }
.subtitle { font-size: 15px; color: var(--secondary-label); margin-top: 2px; }
h2.sec { font-size: 22px; font-weight: 700; margin: 26px 0 10px; }
h3 { font-size: 17px; font-weight: 600; }
.card {
  background: var(--card); border-radius: 14px; padding: 16px; margin-bottom: 12px;
}
.footnote { font-size: 13px; color: var(--secondary-label); line-height: 1.4; }
.footnote a { color: var(--accent); text-decoration: none; }
button.primary {
  display: inline-block; background: var(--accent); color: #fff;
  font: inherit; font-size: 17px; font-weight: 600;
  border: none; border-radius: 12px; padding: 13px 20px; width: 100%;
  cursor: pointer;
}
button.secondary {
  display: inline-block; background: var(--fill); color: var(--accent);
  font: inherit; font-size: 16px; font-weight: 600;
  border: none; border-radius: 12px; padding: 11px 18px; width: 100%;
  cursor: pointer;
}
button.small {
  background: var(--fill); color: var(--accent); font: inherit; font-size: 14px;
  font-weight: 600; border: none; border-radius: 999px; padding: 5px 14px; cursor: pointer;
}
button:active { opacity: .7; }

/* KPI tiles */
.kpis { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.kpi { background: var(--card); border-radius: 14px; padding: 13px 14px; }
.kpi .lbl { font-size: 13px; color: var(--secondary-label); font-weight: 500; }
.kpi .val { font-size: 24px; font-weight: 700; margin-top: 2px; letter-spacing: .2px; }
.kpi .sub { font-size: 12px; color: var(--secondary-label); margin-top: 2px; }
.pos { color: var(--green); } .neg { color: var(--red); }

/* charts */
.chart-card { background: var(--card); border-radius: 14px; padding: 14px 14px 8px; margin-bottom: 12px; }
.chart-title { font-size: 16px; font-weight: 600; }
.chart-sub { font-size: 13px; color: var(--secondary-label); margin-bottom: 6px; }
.legend { display: flex; gap: 14px; margin: 6px 0 2px; flex-wrap: wrap; }
.legend .key { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--secondary-label); }
.legend .swatch { width: 10px; height: 10px; border-radius: 3px; }
.chart-wrap { position: relative; }
.chart-wrap svg { display: block; width: 100%; height: auto; }
.tooltip {
  position: absolute; pointer-events: none; z-index: 10; display: none;
  background: var(--card2); color: var(--label);
  border: 1px solid var(--separator); border-radius: 10px;
  padding: 8px 10px; font-size: 13px; line-height: 1.45;
  box-shadow: 0 4px 14px rgba(0,0,0,.18); white-space: nowrap;
}
.tooltip b { font-weight: 600; }
details.tbl { margin: 4px 0 8px; }
details.tbl summary { font-size: 13px; color: var(--accent); cursor: pointer; padding: 4px 0; }
table.data { width: 100%; border-collapse: collapse; font-size: 13px; }
table.data th, table.data td { text-align: right; padding: 5px 6px; border-top: 1px solid var(--separator); font-variant-numeric: tabular-nums; }
table.data th:first-child, table.data td:first-child { text-align: left; }
table.data th { color: var(--secondary-label); font-weight: 600; border-top: none; }

/* lists (iOS inset grouped) */
.list { background: var(--card); border-radius: 14px; overflow: hidden; margin-bottom: 12px; }
.row { display: flex; align-items: center; gap: 12px; padding: 11px 14px; min-height: 44px; }
.row + .row { border-top: 0.5px solid var(--separator); }
.row .grow { flex: 1; min-width: 0; }
.row .t { font-size: 16px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.row .d { font-size: 13px; color: var(--secondary-label); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.row .amt { font-size: 16px; font-weight: 600; font-variant-numeric: tabular-nums; white-space: nowrap; }
.row .emoji { font-size: 22px; width: 30px; text-align: center; flex-shrink: 0; }
.month-hdr { font-size: 13px; font-weight: 600; color: var(--secondary-label); text-transform: uppercase; letter-spacing: .4px; margin: 18px 4px 6px; }

/* meters */
.meter { height: 10px; border-radius: 5px; background: var(--meter-track); overflow: hidden; margin: 8px 0 4px; }
.meter > div { height: 100%; border-radius: 5px; background: var(--seq); min-width: 4px; transition: width .4s ease; }
.meter.done > div { background: var(--green); }

/* plan steps */
.step { display: flex; gap: 12px; padding: 14px; background: var(--card); border-radius: 14px; margin-bottom: 10px; }
.step .num {
  width: 30px; height: 30px; border-radius: 15px; flex-shrink: 0;
  background: var(--fill); color: var(--secondary-label);
  display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px;
}
.step.done .num { background: var(--green); color: #fff; }
.step.active .num { background: var(--accent); color: #fff; }
.step .grow { flex: 1; min-width: 0; }
.step p { font-size: 14px; color: var(--secondary-label); line-height: 1.45; margin-top: 3px; }
.step .stat { font-size: 14px; margin-top: 6px; font-weight: 600; }
.badge { display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: .3px; text-transform: uppercase; padding: 3px 8px; border-radius: 999px; background: var(--fill); color: var(--secondary-label); margin-left: 6px; vertical-align: 2px; }
.badge.now { background: rgba(10,132,255,.15); color: var(--accent); }
.badge.ok { background: rgba(48,209,88,.15); color: var(--green); }

/* budget breakdown */
.budget-row { display: flex; justify-content: space-between; gap: 12px; padding: 9px 0; font-size: 16px; border-top: 0.5px solid var(--separator); }
.budget-row .l { flex: 1; }
.budget-row:first-child { border-top: none; }
.budget-row .l { color: var(--secondary-label); }
.budget-row .v { font-weight: 600; font-variant-numeric: tabular-nums; }
.budget-row.total { font-weight: 700; }
.budget-row.total .l { color: var(--label); }
.hero { font-size: 48px; font-weight: 700; letter-spacing: .3px; line-height: 1.1; }
.hero-sub { font-size: 14px; color: var(--secondary-label); margin-top: 4px; }

/* forms */
.frow { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 11px 14px; min-height: 44px; }
.frow + .frow { border-top: 0.5px solid var(--separator); }
.frow label { font-size: 16px; }
.frow .hint { font-size: 12px; color: var(--secondary-label); margin-top: 1px; }
input[type=number], input[type=text], input[type=date], select {
  font: inherit; font-size: 16px; color: var(--label);
  background: var(--fill); border: none; border-radius: 8px; padding: 7px 10px;
  max-width: 150px; text-align: right; -moz-appearance: textfield;
}
input[type=text] { text-align: left; max-width: 180px; }
select { text-align: left; max-width: 175px; appearance: none; -webkit-appearance: none; }
input:focus, select:focus { outline: 2px solid var(--accent); }
.switch { position: relative; width: 51px; height: 31px; flex-shrink: 0; }
.switch input { opacity: 0; width: 0; height: 0; }
.switch span { position: absolute; inset: 0; background: var(--fill); border-radius: 16px; transition: .2s; }
.switch span::after { content: ""; position: absolute; width: 27px; height: 27px; border-radius: 14px; top: 2px; left: 2px; background: #fff; box-shadow: 0 2px 4px rgba(0,0,0,.2); transition: .2s; }
.switch input:checked + span { background: #34c759; }
.switch input:checked + span::after { transform: translateX(20px); }

/* filter row */
.filters { display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 2px; }
.filters select, .filters input { flex-shrink: 0; max-width: none; }
.filters input[type=search] { font: inherit; font-size: 15px; background: var(--fill); border: none; border-radius: 8px; padding: 7px 10px; color: var(--label); flex: 1; min-width: 110px; }

/* goals */
.goal-card { background: var(--card); border-radius: 14px; padding: 14px; margin-bottom: 10px; }
.goal-top { display: flex; align-items: center; gap: 10px; }
.goal-top .emoji { font-size: 26px; }
.goal-top .grow { flex: 1; }
.goal-name { font-size: 17px; font-weight: 600; }
.goal-meta { font-size: 13px; color: var(--secondary-label); }
.goal-nums { display: flex; justify-content: space-between; font-size: 13px; color: var(--secondary-label); }
.tpl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.tpl {
  display: flex; align-items: center; gap: 8px; background: var(--card); border: none;
  border-radius: 12px; padding: 11px 12px; font: inherit; font-size: 14px; font-weight: 600;
  color: var(--label); cursor: pointer; text-align: left;
}
.tpl .e { font-size: 20px; }
.tpl .s { display: block; font-size: 11px; font-weight: 400; color: var(--secondary-label); }

/* tab bar */
nav.tabbar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
  display: flex; justify-content: space-around;
  background: var(--tab-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 0.5px solid var(--separator);
  padding: 6px 0 max(env(safe-area-inset-bottom), 6px);
}
nav.tabbar button {
  background: none; border: none; font: inherit; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  color: var(--secondary-label); font-size: 10px; font-weight: 500; width: 20%;
}
nav.tabbar button svg { width: 26px; height: 26px; }
nav.tabbar button.on { color: var(--accent); }

.view { display: none; }
.view.on { display: block; animation: fade .18s ease; }
@keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }

.toast {
  position: fixed; left: 50%; transform: translateX(-50%);
  bottom: calc(78px + env(safe-area-inset-bottom)); z-index: 30;
  background: var(--card2); color: var(--label); border: 1px solid var(--separator);
  border-radius: 12px; padding: 10px 16px; font-size: 14px; font-weight: 500;
  box-shadow: 0 6px 20px rgba(0,0,0,.25); display: none; max-width: 90%;
}
.empty { text-align: center; padding: 36px 20px; }
.empty .big { font-size: 52px; }
.empty h3 { margin: 10px 0 6px; font-size: 20px; }
.empty p { font-size: 15px; color: var(--secondary-label); line-height: 1.5; max-width: 420px; margin: 0 auto 18px; }
.rule-card { background: var(--card); border-radius: 14px; padding: 14px; margin-bottom: 10px; }
.rule-card .n { font-size: 12px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: .5px; }
.rule-card p { font-size: 14px; color: var(--secondary-label); line-height: 1.5; margin-top: 4px; }
.danger { color: var(--red) !important; }

/* installeer-banner + instructies */
.install-banner {
  display: flex; align-items: center; gap: 12px;
  background: var(--card); border-radius: 14px; padding: 11px 13px;
  margin: 10px 0 2px;
}
.install-banner img { width: 42px; height: 42px; border-radius: 10px; }
.install-banner .grow { flex: 1; min-width: 0; }
.install-banner .t { font-size: 15px; font-weight: 600; }
.install-banner .s { font-size: 12px; color: var(--secondary-label); }
.install-banner .getbtn { background: var(--fill); color: var(--accent); font: inherit; font-size: 15px; font-weight: 700; border: none; border-radius: 999px; padding: 6px 16px; flex-shrink: 0; }
.install-banner .x { background: none; border: none; color: var(--tertiary-label); font-size: 20px; padding: 4px 6px; cursor: pointer; }
.sheet-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 40; display: none; align-items: flex-end; justify-content: center; }
.sheet-backdrop.on { display: flex; }
.sheet { background: var(--bg); border-radius: 20px 20px 0 0; width: 100%; max-width: 760px; padding: 20px 20px calc(24px + env(safe-area-inset-bottom)); animation: up .25s ease; }
@keyframes up { from { transform: translateY(40px); opacity: 0; } to { transform: none; opacity: 1; } }
.sheet h3 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.sheet .sub2 { font-size: 14px; color: var(--secondary-label); margin-bottom: 14px; }
.sheet .step { display: flex; align-items: center; gap: 12px; background: var(--card); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; font-size: 15px; }
.sheet .step .n2 { width: 26px; height: 26px; border-radius: 13px; background: var(--accent); color: #fff; font-size: 14px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.sheet .step svg { width: 22px; height: 22px; flex-shrink: 0; color: var(--accent); }
.sheet .close { width: 100%; margin-top: 10px; background: var(--fill); color: var(--accent); font: inherit; font-size: 16px; font-weight: 600; border: none; border-radius: 12px; padding: 13px; cursor: pointer; }

/* omgevingen (persoonlijk / gezamenlijk) */
.envbar { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.envpill {
  border: none; font: inherit; font-size: 14px; font-weight: 600;
  padding: 7px 15px; border-radius: 999px; cursor: pointer;
  background: var(--fill); color: var(--secondary-label);
}
.envpill.on { background: var(--accent); color: #fff; }

/* inloggen / registreren */
.login-wrap { max-width: 420px; margin: 0 auto; padding-top: 5vh; }
.login-logo { width: 84px; height: 84px; border-radius: 20px; display: block; margin: 0 auto 14px; box-shadow: 0 4px 14px rgba(0,0,0,.18); }
.login-wrap h2.ttl { text-align: center; font-size: 28px; font-weight: 700; }
.login-wrap .sub { text-align: center; font-size: 15px; color: var(--secondary-label); margin: 6px 0 20px; line-height: 1.45; }
.field { margin-bottom: 10px; }
.field input {
  width: 100%; max-width: none; text-align: left; font-size: 17px;
  padding: 13px 14px; border-radius: 12px;
  background: var(--card); border: 1px solid var(--separator); color: var(--label);
}
.linkbtn { background: none; border: none; color: var(--accent); font: inherit; font-size: 15px; font-weight: 600; cursor: pointer; padding: 12px; width: 100%; text-align: center; }
.err { color: var(--red); font-size: 14px; margin: 4px 2px 10px; text-align: center; }
.remember { display: flex; align-items: center; justify-content: space-between; padding: 4px 2px 14px; font-size: 15px; }

@media (min-width: 640px) { .kpis { grid-template-columns: repeat(4, 1fr); } }
</style>
</head>
<body>
<div class="wrap">
  <div id="installSlot"></div>
  <header class="app" id="appHeader">
    <h1 id="viewTitle">Overzicht</h1>
    <div class="subtitle" id="viewSub"></div>
    <div class="envbar" id="envbar"></div>
  </header>

  <!-- ============ INLOGGEN ============ -->
  <section id="view-login" class="view"></section>

  <!-- ============ OVERZICHT ============ -->
  <section id="view-overzicht" class="view on"></section>

  <!-- ============ PLAN ============ -->
  <section id="view-plan" class="view"></section>

  <!-- ============ DOELEN ============ -->
  <section id="view-doelen" class="view"></section>

  <!-- ============ TRANSACTIES ============ -->
  <section id="view-transacties" class="view"></section>

  <!-- ============ INSTELLINGEN ============ -->
  <section id="view-instellingen" class="view"></section>
</div>

<nav class="tabbar" id="tabbar"></nav>
<div class="toast" id="toast"></div>
<div class="sheet-backdrop" id="sheet">
  <div class="sheet">
    <h3>Installeer Grip</h3>
    <p class="sub2">Op een iPhone of iPad installeer je apps zo (dit kan alleen via Safari):</p>
    <div class="step"><span class="n2">1</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M8 6.5 12 3l4 3.5"/><path d="M6 10H5a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-9a1 1 0 0 0-1-1h-1"/></svg>
      <span>Tik onderaan op de <b>deelknop</b></span></div>
    <div class="step"><span class="n2">2</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="4" y="4" width="16" height="16" rx="4"/><path d="M12 9v6M9 12h6"/></svg>
      <span>Kies <b>“Zet op beginscherm”</b></span></div>
    <div class="step"><span class="n2">3</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 13 4 4 10-10"/></svg>
      <span>Tik op <b>“Voeg toe”</b> — klaar!</span></div>
    <button class="close" id="sheetClose">Sluit</button>
  </div>
</div>
<input type="file" id="filePick" accept=".csv,.txt,.tsv,.pdf" multiple style="display:none">

<script>
"use strict";
/* =====================================================================
   Grip — persoonlijk financieel dashboard
   Alle data blijft lokaal (localStorage). Geen server, geen tracking.
   Plan gebaseerd op Nibud-vuistregels en de YNAB-methode. Geen financieel advies.
   ===================================================================== */

/* ---------- helpers ---------- */
const $ = (s, el) => (el || document).querySelector(s);
const $$ = (s, el) => Array.from((el || document).querySelectorAll(s));
const EUR = new Intl.NumberFormat("nl-NL", { style: "currency", currency: "EUR", maximumFractionDigits: 0 });
const EURc = new Intl.NumberFormat("nl-NL", { style: "currency", currency: "EUR", minimumFractionDigits: 2 });
const fmtEur = (v, cents) => (cents ? EURc : EUR).format(v);
const MND = ["jan", "feb", "mrt", "apr", "mei", "jun", "jul", "aug", "sep", "okt", "nov", "dec"];
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
const monthKey = d => d.slice(0, 7);
const monthLabel = mk => { const [y, m] = mk.split("-"); return MND[+m - 1] + " ’" + y.slice(2); };
let toastTimer;
function toast(msg) {
  const t = $("#toast"); t.textContent = msg; t.style.display = "block";
  clearTimeout(toastTimer); toastTimer = setTimeout(() => (t.style.display = "none"), 3200);
}

/* ---------- accounts, versleuteling & opslag ----------
   Elk account versleutelt zijn eigen gegevens (AES-GCM) met een sleutel die
   uit het wachtwoord wordt afgeleid (PBKDF2). Zonder het wachtwoord is de
   data van een ander gezinslid dus niet te lezen — ook niet door de beheerder
   van dit apparaat of deze website. Er is geen server: het e-mailadres is
   alleen een inlognaam, er worden geen e-mails verstuurd.                  */
const ACC_KEY = "grip.accounts.v1";
const DATA_PREFIX = "grip.data.";
const SES_KEY = "grip.session.v1";
const LEGACY_KEY = "grip.v1";
const DEFAULT_SETTINGS = {
  incomeOverride: null,   // netto maandinkomen; null = uit data
  housing: "huur",        // huur | koop
  hasCar: false,
  kids: 0,
  homeValue: 350000,
  currentSavings: 0,      // huidig spaarsaldo (buffer)
  expensiveDebt: 0,       // dure schulden (excl. hypotheek/studieschuld)

const _te = new TextEncoder(), _td = new TextDecoder();
function b64(buf) { const u = new Uint8Array(buf); let s = ""; for (let i = 0; i < u.length; i++) s += String.fromCharCode(u[i]); return btoa(s); }
const unb64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function deriveRaw(password, saltB64) {
  const km = await crypto.subtle.importKey("raw", _te.encode(password), "PBKDF2", false, ["deriveBits"]);
  const bits = await crypto.subtle.deriveBits({ name: "PBKDF2", salt: unb64(saltB64), iterations: 310000, hash: "SHA-256" }, km, 256);
  return new Uint8Array(bits);
}
const keyFromRaw = raw => crypto.subtle.importKey("raw", raw, "AES-GCM", false, ["encrypt", "decrypt"]);
async function makeVerifier(raw, saltB64) {

  const buf = new Uint8Array(raw.length + salt.length);
  buf.set(raw); buf.set(salt, raw.length);
  return b64(await crypto.subtle.digest("SHA-256", buf));
}
async function encryptJSON(key, obj) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, _te.encode(JSON.stringify(obj)));
  return { v: 1, iv: b64(iv), ct: b64(ct) };
}
async function decryptJSON(key, blob) {
  const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv: unb64(blob.iv) }, key, unb64(blob.ct));
  return JSON.parse(_td.decode(pt));
}

function normalizeEnvData(d) {

}
async function registerAccount(name, email, password, password2, remember) {
  email = email.trim().toLowerCase();
  if (!/^\S+@\S+\.\S+$/.test(email)) throw new Error("Vul een geldig e-mailadres in.");
  if (password.length < 8) throw new Error("Kies een wachtwoord van minimaal 8 tekens.");
  if (password !== password2) throw new Error("De wachtwoorden zijn niet gelijk.");
  if (auth.accounts.some(a => a.email === email)) throw new Error("Er bestaat op dit apparaat al een account met dit e-mailadres.");
  const salt = b64(crypto.getRandomValues(new Uint8Array(16)));
  const raw = await deriveRaw(password, salt);
  const acc = {
    id: "a" + Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
    name: (name || "").trim() || email.split("@")[0],
    email, salt,
    verifier: await makeVerifier(raw, salt),
  };
  store = {
    envs: [{ id: "p", name: "Persoonlijk", emoji: "👤" }, { id: "g", name: "Gezamenlijk", emoji: "🏠" }],
    data: { p: emptyEnvData(), g: emptyEnvData() },
  };
  // gegevens van vóór de account-update (onversleuteld) meenemen naar het eerste account
  if (auth.accounts.length === 0) {
    try {
      const legacy = JSON.parse(localStorage.getItem(LEGACY_KEY));
      if (legacy && legacy.tx) { store.data.p = normalizeEnvData(legacy); localStorage.removeItem(LEGACY_KEY); }
    } catch (e) {}
  }
  auth.accounts.push(acc); saveAccounts();
  session = { account: acc, key: await keyFromRaw(raw), rawB64: b64(raw), envId: "p" };
  await persistNow();
  setRemember(remember);
}
async function loginAccount(email, password, remember) {
  email = email.trim().toLowerCase();
  const acc = auth.accounts.find(a => a.email === email);
  if (!acc) throw new Error("Geen account met dit e-mailadres op dit apparaat. Nieuw hier? Maak een account.");
  const raw = await deriveRaw(password, acc.salt);
  if (await makeVerifier(raw, acc.salt) !== acc.verifier) throw new Error("Onjuist wachtwoord.");
  const key = await keyFromRaw(raw);
  store = await loadStore(acc.id, key);
  session = { account: acc, key, rawB64: b64(raw), envId: store.envs[0].id };
  setRemember(remember);
}
async function loadStore(accId, key) {
  const rawBlob = localStorage.getItem(DATA_PREFIX + accId);
  if (!rawBlob) return { envs: [{ id: "p", name: "Persoonlijk", emoji: "👤" }], data: { p: emptyEnvData() } };
  const s = await decryptJSON(key, JSON.parse(rawBlob));
  for (const e of s.envs) s.data[e.id] = normalizeEnvData(s.data[e.id] || {});
  return s;
}
function setRemember(remember) {
  if (remember) localStorage.setItem(SES_KEY, JSON.stringify({ accountId: session.account.id, rawKey: session.rawB64 }));
  else localStorage.removeItem(SES_KEY);
}
async function tryAutoLogin() {
  try {
    const s = JSON.parse(localStorage.getItem(SES_KEY));
    if (!s) return false;
    const acc = auth.accounts.find(a => a.id === s.accountId);
    if (!acc) return false;
    const key = await keyFromRaw(unb64(s.rawKey));
    store = await loadStore(acc.id, key);
    session = { account: acc, key, rawB64: s.rawKey, envId: store.envs[0].id };
    return true;
  } catch (e) { return false; }
}
async function changePassword(oldPw, newPw, newPw2) {
  const acc = session.account;
  const oldRaw = await deriveRaw(oldPw, acc.salt);
  if (await makeVerifier(oldRaw, acc.salt) !== acc.verifier) throw new Error("Huidig wachtwoord is onjuist.");
  if (newPw.length < 8) throw new Error("Kies een nieuw wachtwoord van minimaal 8 tekens.");
  if (newPw !== newPw2) throw new Error("De nieuwe wachtwoorden zijn niet gelijk.");
  const salt = b64(crypto.getRandomValues(new Uint8Array(16)));
  const raw = await deriveRaw(newPw, salt);
  acc.salt = salt; acc.verifier = await makeVerifier(raw, salt);
  session.key = await keyFromRaw(raw); session.rawB64 = b64(raw);
  saveAccounts();

}

/* ---------- CSV / bestandsparsers (NL banken) ---------- */
function parseCSVText(text, delim) {
  const rows = []; let row = [], cur = "", inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQ) {
      if (c === '"') { if (text[i + 1] === '"') { cur += '"'; i++; } else inQ = false; }
      else cur += c;
    } else if (c === '"') inQ = true;
    else if (c === delim) { row.push(cur); cur = ""; }
    else if (c === "\n" || c === "\r") {
      if (c === "\r" && text[i + 1] === "\n") i++;
      row.push(cur); cur = "";
      if (row.length > 1 || row[0] !== "") rows.push(row);
      row = [];
    } else cur += c;
  }
  if (cur !== "" || row.length) { row.push(cur); if (row.length > 1 || row[0] !== "") rows.push(row); }
  return rows;
}
function detectDelim(line) {
  let best = ";", n = -1;
  for (const d of [";", ",", "\t"]) {
    let cnt = 0, inQ = false;
    for (const c of line) { if (c === '"') inQ = !inQ; else if (!inQ && c === d) cnt++; }
    if (cnt > n) { n = cnt; best = d; }
  }
  return best;
}
function parseAmountNL(s) {
  if (s == null) return NaN;
  s = String(s).replace(/[€\s+]/g, "").replace(/^\((.*)\)$/, "-$1");
  const hasC = s.includes(","), hasD = s.includes(".");
  if (hasC && hasD) s = s.lastIndexOf(",") > s.lastIndexOf(".") ? s.replace(/\./g, "").replace(",", ".") : s.replace(/,/g, "");
  else if (hasC) s = s.replace(",", ".");
  const v = parseFloat(s);
  return isNaN(v) ? NaN : v;
}
function parseDateAny(s) {
  if (!s) return null;
  s = String(s).trim();
  let m;
  if ((m = s.match(/^(\d{4})-(\d{2})-(\d{2})/))) return `${m[1]}-${m[2]}-${m[3]}`;
  if ((m = s.match(/^(\d{4})(\d{2})(\d{2})$/))) return `${m[1]}-${m[2]}-${m[3]}`;
  if ((m = s.match(/^(\d{1,2})[-/](\d{1,2})[-/](\d{4})/))) return `${m[3]}-${m[2].padStart(2, "0")}-${m[1].padStart(2, "0")}`;
  return null;
}
const isDate = s => !!parseDateAny(s);

function parseFile(name, text) {
  text = text.replace(/^﻿/, "");
  const firstLine = text.slice(0, text.indexOf("\n") + 1 || text.length);
  const delim = detectDelim(firstLine);
  const rows = parseCSVText(text, delim);
  if (!rows.length) return [];
  const hdr = rows[0].map(h => h.toLowerCase().trim());
  const hjoin = hdr.join("|");

  // --- ING: Datum, Naam / Omschrijving, Rekening, Tegenrekening, Code, Af Bij, Bedrag (EUR), ...
  if (hjoin.includes("af bij") || (hjoin.includes("naam / omschrijving") && hjoin.includes("bedrag"))) {
    const ix = n => hdr.findIndex(h => h.includes(n));
    const iDat = ix("datum"), iNaam = ix("naam"), iRek = ix("rekening"), iTgn = ix("tegenrekening"),
          iAfBij = ix("af bij"), iBedr = ix("bedrag"), iMed = ix("mededeling");
    return rows.slice(1).map(r => {
      const date = parseDateAny(r[iDat]); if (!date) return null;
      let amount = parseAmountNL(r[iBedr]); if (isNaN(amount)) return null;
      if (/af/i.test(r[iAfBij] || "")) amount = -Math.abs(amount); else amount = Math.abs(amount);
      return { date, amount, name: (r[iNaam] || "").trim(), desc: (r[iMed] || "").trim(),
               iban: (r[iRek] || "").replace(/\s/g, ""), ctpIban: (r[iTgn] || "").replace(/\s/g, "") };
    }).filter(Boolean);
  }

  // --- Rabobank: IBAN/BBAN, Munt, BIC, Volgnr, Datum, Rentedatum, Bedrag, Saldo na trn, Tegenrekening..., Naam tegenpartij, ..., Omschrijving-1..3
  if (hjoin.includes("volgnr") || hjoin.includes("iban/bban")) {
    const ix = n => hdr.findIndex(h => h.includes(n));
    const iRek = ix("iban/bban"), iDat = ix("datum"), iBedr = ix("bedrag"),
          iTgn = hdr.findIndex(h => h.includes("tegenrekening")), iNaam = ix("naam tegenpartij"),
          iO1 = ix("omschrijving-1"), iO2 = ix("omschrijving-2"), iO3 = ix("omschrijving-3");
    return rows.slice(1).map(r => {
      const date = parseDateAny(r[iDat]); if (!date) return null;
      const amount = parseAmountNL(r[iBedr]); if (isNaN(amount)) return null;
      const desc = [iO1, iO2, iO3].map(i => (i >= 0 && r[i]) || "").join(" ").trim();
      return { date, amount, name: (r[iNaam] || "").trim() || desc.slice(0, 40), desc,
               iban: (r[iRek] || "").replace(/\s/g, ""), ctpIban: ((iTgn >= 0 && r[iTgn]) || "").replace(/\s/g, "") };
    }).filter(Boolean);
  }

  // --- ABN AMRO (TAB, met of zonder header): rekening, munt, transactiedatum(yyyymmdd), rente, beginsaldo, eindsaldo, bedrag, omschrijving
  const looksAbn = r => r.length >= 8 && /^\d{8}$/.test(String(r[2] || "").trim()) && /^[A-Z]{3}$/.test(String(r[1] || "").trim());
  if ((delim === "\t" && rows.some(looksAbn)) || hjoin.includes("transactiondate") || hjoin.includes("mutationcode")) {
    const body = looksAbn(rows[0]) ? rows : rows.slice(1);
    return body.filter(looksAbn).map(r => {
      const date = parseDateAny(r[2]); const amount = parseAmountNL(r[6]);
      if (!date || isNaN(amount)) return null;
      const raw = String(r[7] || "");
      const desc = raw.replace(/\s+/g, " ").trim();
      let name = "", m;
      // "NAAM: Zilveren Kruis" in SEPA-omschrijvingen (velden gescheiden door 2+ spaties of /)
      if ((m = raw.match(/NAAM[:\/ ]\s*(.+?)(?:\s{2,}|\/|MACHTIGING|OMSCHRIJVING|KENMERK|$)/i))) name = m[1].trim();
      // "BEA, Betaalpas    Jumbo Utrecht,PAS123" — pinbetalingen
      if (!name && (m = raw.match(/^(?:BEA|GEA|eCom)[, ].*?\s{2,}(.+?),\s*PAS/i))) name = m[1].trim();
      if (!name && (m = desc.match(/^(?:BEA|GEA|eCom)[, ]+\S+\s+(.+?),\s*PAS/i))) name = m[1].trim();
      if (!name) name = desc.slice(0, 40);
      return { date, amount, name, desc, iban: String(r[0]).replace(/\s/g, ""), ctpIban: "" };
    }).filter(Boolean);
  }

  // --- Generiek: zoek datum-, bedrag- en omschrijvingkolommen (header of heuristiek)
  const hasHeader = !isDate(rows[0][0]) && rows[0].every(c => isNaN(parseAmountNL(c)) || c.trim() === "");
  const body = hasHeader ? rows.slice(1) : rows;
  if (!body.length) return [];
  const H = hasHeader ? hdr : [];
  const find = (...names) => H.findIndex(h => names.some(n => h.includes(n)));
  let iDat = find("datum", "date", "boekdatum");
  let iBedr = find("bedrag", "amount", "transactiebedrag");
  let iNaam = find("naam", "name", "tegenpartij", "counterparty");
  let iDesc = find("omschrijving", "description", "mededeling", "memo");
  const iAfBij = find("af bij", "debit/credit", "credit/debit", "d/c");
  const sample = body.slice(0, 25);
  if (iDat < 0) iDat = rows[0].findIndex((_, i) => sample.filter(r => isDate(r[i])).length > sample.length / 2);
  if (iBedr < 0) {
    let bestI = -1, bestScore = -1;
    rows[0].forEach((_, i) => {
      if (i === iDat) return;
      const vals = sample.map(r => parseAmountNL(r[i]));
      const nums = vals.filter(v => !isNaN(v));
      if (nums.length < sample.length / 2) return;
      const frac = nums.filter(v => Math.abs(v % 1) > 1e-9).length + nums.filter(v => v < 0).length;
      if (frac > bestScore) { bestScore = frac; bestI = i; }
    });
    iBedr = bestI;
  }
  if (iDesc < 0) {
    let bestI = -1, bestLen = -1;
    rows[0].forEach((_, i) => {
      if (i === iDat || i === iBedr) return;
      const len = sample.reduce((a, r) => a + String(r[i] || "").length, 0);
      if (len > bestLen) { bestLen = len; bestI = i; }
    });
    iDesc = bestI;
  }
  if (iDat < 0 || iBedr < 0) return [];
  return body.map(r => {
    const date = parseDateAny(r[iDat]); let amount = parseAmountNL(r[iBedr]);
    if (!date || isNaN(amount)) return null;
    if (iAfBij >= 0 && /af|debet|debit|^d$/i.test(String(r[iAfBij] || "").trim())) amount = -Math.abs(amount);
    const name = iNaam >= 0 ? String(r[iNaam] || "").trim() : "";
    const desc = iDesc >= 0 ? String(r[iDesc] || "").trim() : "";
    return { date, amount, name: name || desc.slice(0, 40), desc, iban: "", ctpIban: "" };
  }).filter(Boolean);
}

/* ---------- PDF-afschriften (pdf.js, lokaal meegeleverd) ----------
   PDF's zijn "geprinte" pagina's zonder vaste structuur; deze parser haalt de
   transactieregels eruit met heuristieken (datum + bedrag per regel, Af/Bij-
   kolommen of +/- voor het teken). CSV blijft het betrouwbaarst.            */
let pdfLibPromise = null;
function loadPdfLib() {
  if (!pdfLibPromise) pdfLibPromise = new Promise((resolve, reject) => {
    if (window.pdfjsLib) return resolve(window.pdfjsLib);
    const s = document.createElement("script");
    s.src = "lib/pdf.min.js";
    s.onload = () => {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = "lib/pdf.worker.min.js";
      resolve(window.pdfjsLib);
    };
    s.onerror = () => { pdfLibPromise = null; reject(new Error("PDF-lezer kon niet laden")); };
    document.head.appendChild(s);
  });
  return pdfLibPromise;
}
async function parsePdf(buf) {
  const pdfjs = await loadPdfLib();
  const doc = await pdfjs.getDocument({ data: new Uint8Array(buf) }).promise;
  const lines = [];
  let textLen = 0;
  for (let p = 1; p <= doc.numPages; p++) {
    const page = await doc.getPage(p);
    const tc = await page.getTextContent();
    const rows = [];
    for (const it of tc.items) {
      if (!it.str || !it.str.trim()) continue;
      textLen += it.str.length;
      const y = it.transform[5];
      let row = rows.find(r => Math.abs(r.y - y) <= 2.5);
      if (!row) { row = { y, items: [] }; rows.push(row); }
      row.items.push({ x: it.transform[4], s: it.str.trim() });
    }
    rows.sort((a, b) => b.y - a.y);
    for (const r of rows) { r.items.sort((a, b) => a.x - b.x); lines.push(r.items); }
    lines.push(null); // paginagrens
  }
  doc.destroy();
  if (textLen < 40) throw new Error("deze PDF bevat geen leesbare tekst (gescand document?)");
  return extractTxFromPdfLines(lines);
}
function extractTxFromPdfLines(lines) {
  const AMT_RE = /^[+-]?\s?€?\s?\d{1,3}(?:\.\d{3})*,\d{2}\s?[+-]?$/;
  const DATE_RE = /^(\d{1,2})[-/](\d{1,2})[-/](\d{4})$|^(\d{4})-(\d{2})-(\d{2})$/;
  const SKIP_RE = /saldo|totaal|pagina|rekeningafschrift|afschriftnummer|periode|blad\s|www\.|telefoon|kvk|btw/i;
  const parseDate = tok => {
    let m = tok.match(/^(\d{1,2})[-/](\d{1,2})[-/](\d{4})$/);
    if (m) return `${m[3]}-${m[2].padStart(2, "0")}-${m[1].padStart(2, "0")}`;
    m = tok.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    return m ? `${m[1]}-${m[2]}-${m[3]}` : null;
  };
  let afX = null, bijX = null;
  const txs = [];
  let cur = null;
  for (const line of lines) {
    if (!line) { cur = null; continue; }
    // kolomkoppen "Af" / "Bij" onthouden voor tekenbepaling
    for (const it of line) {
      const t = it.s.toLowerCase();
      if (t === "af" || t === "af (eur)") afX = it.x;
      if (t === "bij" || t === "bij (eur)") bijX = it.x;
    }
    // tokens: elk item kan meerdere woorden bevatten; splits maar bewaar x
    const tokens = [];
    for (const it of line) for (const w of it.s.split(/\s+/)) if (w) tokens.push({ x: it.x, s: w });
    const full = tokens.map(t => t.s).join(" ");
    if (SKIP_RE.test(full)) { cur = null; continue; }
    let date = null;
    for (const t of tokens) { const d = DATE_RE.test(t.s) && parseDate(t.s); if (d) { date = d; break; } }
    const amounts = tokens.filter(t => AMT_RE.test(t.s));
    if (date && amounts.length) {
      // bij meerdere bedragen (bijv. bedrag + saldo): kies het bedrag het dichtst
      // bij de Af/Bij-kolommen, anders het eerste
      let pick = amounts[0];
      if (afX != null || bijX != null) {
        pick = amounts.reduce((best, a) => {
          const d = Math.min(Math.abs(a.x - (afX ?? 1e9)), Math.abs(a.x - (bijX ?? 1e9)));
          const db = Math.min(Math.abs(best.x - (afX ?? 1e9)), Math.abs(best.x - (bijX ?? 1e9)));
          return d < db ? a : best;
        }, amounts[0]);
      }
      let amount = parseAmountNL(pick.s.replace(/[+-]\s?$/, m2 => m2.trim()));
      if (isNaN(amount)) continue;
      amount = Math.abs(amount);
      // teken: expliciete +/-, losse Af/Bij-woorden, of kolompositie
      const raw = pick.s;
      const words = tokens.map(t => t.s.toLowerCase());
      let neg;
      if (/^-|-$/.test(raw.trim())) neg = true;
      else if (/^\+|\+$/.test(raw.trim())) neg = false;
      else if (words.includes("af") || words.includes("debet")) neg = true;
      else if (words.includes("bij") || words.includes("credit")) neg = false;
      else if (afX != null && bijX != null) neg = Math.abs(pick.x - afX) <= Math.abs(pick.x - bijX);
      else neg = true; // afschriftregels zijn meestal afschrijvingen
      const desc = tokens
        .filter(t => t !== pick && !DATE_RE.test(t.s) && !AMT_RE.test(t.s) && !/^(af|bij|debet|credit)$/i.test(t.s))
        .map(t => t.s).join(" ").trim();
      if (!desc) continue;
      cur = { date, amount: neg ? -amount : amount, name: desc.slice(0, 48), desc, iban: "", ctpIban: "" };
      txs.push(cur);
    } else if (cur && !date && !amounts.length && full.length > 1 && cur.desc.length < 200) {
      cur.desc += " " + full; // vervolgregel van de omschrijving
    }
  }
  return txs;
}

function txKey(t) {
  return t.date + "|" + t.amount.toFixed(2) + "|" + (t.name + t.desc).toLowerCase().replace(/\s/g, "").slice(0, 40);
}
function importTransactions(parsed) {
  const existing = new Set(state.tx.map(txKey));
  let added = 0, dupes = 0;
  for (const t of parsed) {
    const k = txKey(t);
    if (existing.has(k)) { dupes++; continue; }
    existing.add(k);
    state.tx.push({ date: t.date, amount: Math.round(t.amount * 100) / 100, name: t.name, desc: t.desc, iban: t.iban || "", ctpIban: t.ctpIban || "" });
    added++;
  }
  state.tx.sort((a, b) => b.date.localeCompare(a.date));
  save();
  return { added, dupes };
}

/* ---------- analytics ---------- */
let cache = null;
function invalidate() { cache = null; }

function analytics() {
  if (cache) return cache;
  const ownIbans = new Set(state.tx.map(t => t.iban).filter(Boolean));
  const enriched = state.tx.map(t => {
    const tt = { ...t, ownIbans };
    const cat = categorize(tt);
    return { ...t, cat, type: CATS[cat].type, nkey: normName(t) };
  });

  // maanden
  const byMonth = new Map();
  for (const t of enriched) {
    if (t.type === "transfer") continue;
    const mk = monthKey(t.date);
    if (!byMonth.has(mk)) byMonth.set(mk, { income: 0, expense: 0, saving: 0, cats: {} });
    const m = byMonth.get(mk);
    if (t.type === "income" || (t.amount > 0 && t.type !== "saving")) m.income += t.amount;
    else if (t.type === "saving") m.saving += -t.amount;
    else m.expense += -t.amount;
    m.cats[t.cat] = (m.cats[t.cat] || 0) + Math.abs(t.amount);
  }
  const months = [...byMonth.keys()].sort();
  // laatste (max 12) volledige maanden voor gemiddelden; laat de lopende maand weg
  const nowMk = new Date().toISOString().slice(0, 7);
  const fullMonths = months.filter(mk => mk < nowMk);
  const avgWindow = fullMonths.slice(-12);
  const avg = f => avgWindow.length ? avgWindow.reduce((a, mk) => a + f(byMonth.get(mk)), 0) / avgWindow.length : 0;
  const avgIncome = avg(m => m.income);
  const avgExpense = avg(m => m.expense);
  const avgSaving = avg(m => m.saving);

  // vaste lasten: terugkerende afschrijvingen per tegenpartij
  const groups = new Map();
  for (const t of enriched) {
    if (t.amount >= 0 || t.type === "transfer" || t.type === "saving" || !t.nkey) continue;
    if (!groups.has(t.nkey)) groups.set(t.nkey, { name: t.name || t.nkey, cat: t.cat, txs: [] });
    groups.get(t.nkey).txs.push(t);
  }
  const fixed = [];
  const windowSet = new Set(avgWindow);
  for (const g of groups.values()) {
    const mks = new Set(g.txs.map(t => monthKey(t.date)));
    const inWindow = [...mks].filter(mk => windowSet.has(mk)).length;
    const need = Math.max(3, Math.ceil(avgWindow.length * 0.7));
    const catFixed = !!CATS[g.cat].fixed;
    if (avgWindow.length >= 3 && inWindow >= Math.min(need, avgWindow.length)) {
      const monthlyTotals = [...mks].filter(mk => windowSet.has(mk))
        .map(mk => g.txs.filter(t => monthKey(t.date) === mk).reduce((a, t) => a + -t.amount, 0));
      monthlyTotals.sort((a, b) => a - b);
      const median = monthlyTotals[Math.floor(monthlyTotals.length / 2)] || 0;
      const mean = monthlyTotals.reduce((a, b) => a + b, 0) / monthlyTotals.length;
      const sd = Math.sqrt(monthlyTotals.reduce((a, b) => a + (b - mean) ** 2, 0) / monthlyTotals.length);
      const stable = mean > 0 && sd / mean < 0.45;
      if (catFixed || (stable && !NEVER_FIXED.has(g.cat))) fixed.push({ name: g.name, cat: g.cat, monthly: median, count: g.txs.length });
    }
  }
  fixed.sort((a, b) => b.monthly - a.monthly);
  const fixedTotal = fixed.reduce((a, f) => a + f.monthly, 0);

  // categorie-totalen (gem. p/m over venster)
  const catAvg = {};
  for (const mk of avgWindow) {
    const m = byMonth.get(mk);
    for (const [c, v] of Object.entries(m.cats)) catAvg[c] = (catAvg[c] || 0) + v / avgWindow.length;
  }

  const income = state.settings.incomeOverride || avgIncome;
  cache = { enriched, byMonth, months, avgWindow, avgIncome, avgExpense, avgSaving, fixed, fixedTotal, catAvg, income, ownIbans };
  return cache;
}

/* ---------- plan (Nibud + YNAB) ---------- */
function bufferAdvice() {
  const a = analytics();
  const s = state.settings;
  // Indicatie geïnspireerd op de Nibud BufferBerekenaar (bufferberekenaar.nibud.nl):
  // basis voor inboedel/apparaten/onvoorzien + opslag voor koopwoning, auto en kinderen.
  let nibud = 3500;
  if (s.housing === "koop") nibud += 2500;
  if (s.hasCar) nibud += 1500;
  nibud += (s.kids || 0) * 350;
  const threeMonths = Math.round(a.fixedTotal * 3);
  const sixMonths = Math.round(a.fixedTotal * 6);
  const advies = Math.max(nibud, threeMonths);
  return { nibud, threeMonths, sixMonths, advies };
}
function goalsMonthlyTotal() {
  return state.goals.reduce((a, g) => a + goalMonthly(g), 0);
}
function goalMonthly(g) {
  if (g.done || g.current >= g.target) return 0;
  if (g.monthly) return g.monthly;
  if (g.deadline) {
    const months = Math.max(1, monthsBetween(new Date(), new Date(g.deadline)));
    return Math.max(0, (g.target - g.current) / months);
  }
  return 0;
}
function monthsBetween(a, b) {
  return (b.getFullYear() - a.getFullYear()) * 12 + (b.getMonth() - a.getMonth());
}
function planSteps() {
  const a = analytics();
  const s = state.settings;
  const buf = bufferAdvice();
  const savings = s.currentSavings || 0;
  const steps = [
    {
      title: "Inzicht in je geldstromen",
      body: "Upload je afschriften zodat je precies weet wat er binnenkomt en waar het heen gaat. Dit is de basis van elk plan (YNAB-regel 1: geef elke euro een taak).",
      done: a.months.length >= 2,
      stat: a.months.length ? `${state.tx.length.toLocaleString("nl-NL")} transacties over ${a.months.length} maanden geladen` : "Nog geen data — upload je afschriften via Instellingen of Overzicht",
    },
    {
      title: "Mini-buffer van € 1.000",
      body: "Een klein noodfonds voorkomt dat een kapotte wasmachine meteen een schuld wordt. Zet dit apart op een aparte spaarrekening vóór al het andere.",
      done: savings >= 1000,
      progress: Math.min(1, savings / 1000),
      stat: `${fmtEur(Math.min(savings, 1000))} van ${fmtEur(1000)}`,
    },
    {
      title: "Dure schulden aflossen",
      body: "Rood staan, creditcardschuld en 'koop nu, betaal later' kosten vaak 8–14% rente — aflossen levert gegarandeerd meer op dan sparen of beleggen. Hypotheek en studieschuld horen hier niet bij.",
      done: (s.expensiveDebt || 0) <= 0,
      stat: (s.expensiveDebt || 0) > 0 ? `Nog ${fmtEur(s.expensiveDebt)} dure schuld (instelbaar bij Instellingen)` : "Geen dure schulden ✓",
    },
    {
      title: `Volledige buffer van ${fmtEur(buf.advies)}`,
      body: `Indicatie op basis van jouw situatie (geïnspireerd op de Nibud BufferBerekenaar): ${fmtEur(buf.nibud)}. Vuistregel 3× je vaste lasten: ${fmtEur(buf.threeMonths)} — ruim is 6×: ${fmtEur(buf.sixMonths)}. Dit is ook YNAB-regel 4: leef deze maand van het geld van vórige maand.`,
      done: savings >= buf.advies,
      progress: buf.advies ? Math.min(1, savings / buf.advies) : 0,
      stat: `${fmtEur(savings)} van ${fmtEur(buf.advies)}`,
    },
    {
      title: "Reserveer voor grote, onregelmatige uitgaven",
      body: "Auto-onderhoud, huisonderhoud (±1% van de woningwaarde per jaar), kleding, cadeaus, vakantie: geen verrassingen maar 'echte uitgaven' (YNAB-regel 2). Maak er potjes voor bij Doelen en zet er maandelijks automatisch geld voor apart.",
      done: state.goals.filter(g => g.kind !== "buffer").length >= 2,
      stat: state.goals.filter(g => g.kind !== "buffer").length ? `${state.goals.filter(g => g.kind !== "buffer").length} potje(s) ingesteld` : "Nog geen potjes — stel ze in bij Doelen",
    },
    {
      title: "Beleggen voor de lange termijn",
      body: "Is je buffer compleet en los je niets duurs af? Dan kan geld dat je 10+ jaar kunt missen aan het werk, bijvoorbeeld maandelijks automatisch in breed gespreide indexfondsen. Beleg nooit je buffer. (Dit is informatie, geen financieel advies.)",
      done: false,
      stat: savings >= buf.advies ? "Je buffer staat — je kunt deze stap verkennen" : "Eerst je buffer afronden",
    },
  ];
  let activeSet = false;
  for (const st of steps) { if (!st.done && !activeSet) { st.active = true; activeSet = true; } }
  return steps;
}

/* ---------- charts (SVG, handgetekend) ---------- */
function niceTicks(maxV) {
  const steps = [10, 20, 25, 50, 100, 200, 250, 500, 1000, 2000, 2500, 5000, 10000, 20000];
  const step = steps.find(s => maxV / s <= 4.5) || 50000;
  const ticks = [];
  for (let v = 0; v <= maxV + step * 0.999; v += step) ticks.push(v);
  return ticks;
}
const fmtK = v => Math.abs(v) >= 1000 ? (v / 1000).toLocaleString("nl-NL", { maximumFractionDigits: 1 }) + "k" : String(Math.round(v));

function attachTooltip(wrapEl, items, html) {
  const tip = document.createElement("div");
  tip.className = "tooltip"; wrapEl.appendChild(tip);
  const show = (i, evt) => {
    tip.innerHTML = html(items[i]); tip.style.display = "block";
    const r = wrapEl.getBoundingClientRect();
    const x = (evt.touches ? evt.touches[0].clientX : evt.clientX) - r.left;
    const y = (evt.touches ? evt.touches[0].clientY : evt.clientY) - r.top;
    const tw = tip.offsetWidth, th = tip.offsetHeight;
    tip.style.left = Math.max(4, Math.min(r.width - tw - 4, x - tw / 2)) + "px";
    tip.style.top = Math.max(4, y - th - 14) + "px";
  };
  $$(".hit", wrapEl).forEach((h, i) => {
    h.addEventListener("mousemove", e => show(i, e));
    h.addEventListener("mouseleave", () => (tip.style.display = "none"));
    h.addEventListener("touchstart", e => { show(i, e); }, { passive: true });
  });
  wrapEl.addEventListener("touchend", () => setTimeout(() => (tip.style.display = "none"), 1600), { passive: true });
}

// gegroepeerde kolommen: inkomen vs uitgaven per maand
function chartInOut(el, data) {
  const W = Math.max(320, el.clientWidth || 600), H = 220;
  const padL = 40, padR = 6, padT = 8, padB = 22;
  const iw = W - padL - padR, ih = H - padT - padB;
  const maxV = Math.max(100, ...data.map(d => Math.max(d.income, d.expense)));
  const ticks = niceTicks(maxV);
  const top = ticks[ticks.length - 1];
  const y = v => padT + ih - (v / top) * ih;
  const band = iw / data.length;
  const barW = Math.min(14, Math.max(4, band * 0.28));
  let s = `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Inkomsten en uitgaven per maand">`;
  for (const t of ticks) {
    s += `<line x1="${padL}" x2="${W - padR}" y1="${y(t)}" y2="${y(t)}" stroke="var(--grid)" stroke-width="1"/>`;
    s += `<text x="${padL - 6}" y="${y(t) + 3.5}" text-anchor="end" font-size="10" fill="var(--muted-ink)" font-variant-numeric="tabular-nums">${fmtK(t)}</text>`;
  }
  const lblEvery = Math.ceil(data.length / 8);
  data.forEach((d, i) => {
    const cx = padL + band * i + band / 2;
    const x1 = cx - barW - 1, x2 = cx + 1;
    const hIn = Math.max(0, y(0) - y(d.income)), hOut = Math.max(0, y(0) - y(d.expense));
    const r = Math.min(4, barW / 2);
    const bar = (x, h, col) => h < 0.5 ? "" :
      `<path d="M${x},${y(0)} v${-Math.max(h - r, 0)} q0,${-r} ${r},${-r} h${barW - 2 * r} q${r},0 ${r},${r} v${Math.max(h - r, 0)} z" fill="${col}"/>`;
    s += bar(x1, hIn, "var(--series-in)");
    s += bar(x2, hOut, "var(--series-out)");
    if (i % lblEvery === 0) s += `<text x="${cx}" y="${H - 6}" text-anchor="middle" font-size="10" fill="var(--muted-ink)">${d.label}</text>`;
    s += `<rect class="hit" x="${padL + band * i}" y="${padT}" width="${band}" height="${ih}" fill="transparent"/>`;
  });
  s += `<line x1="${padL}" x2="${W - padR}" y1="${y(0)}" y2="${y(0)}" stroke="var(--axis)" stroke-width="1"/></svg>`;
  el.innerHTML = s;
  attachTooltip(el, data, d =>
    `<b>${d.full}</b><br>Inkomsten: <b>${fmtEur(d.income)}</b><br>Uitgaven: <b>${fmtEur(d.expense)}</b><br>Netto: <b>${fmtEur(d.income - d.expense)}</b>`);
}

// divergerende kolommen: netto per maand
function chartNet(el, data) {
  const W = Math.max(320, el.clientWidth || 600), H = 190;
  const padL = 40, padR = 6, padT = 8, padB = 22;
  const iw = W - padL - padR, ih = H - padT - padB;
  const maxV = Math.max(100, ...data.map(d => Math.abs(d.net)));
  const ticks = niceTicks(maxV);
  const top = ticks[ticks.length - 1];
  const y = v => padT + ih / 2 - (v / top) * (ih / 2);
  const band = iw / data.length;
  const barW = Math.min(16, Math.max(5, band * 0.5));
  let s = `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Netto gespaard of tekort per maand">`;
  for (const t of ticks) {
    if (t === 0) continue;
    for (const v of [t, -t]) {
      s += `<line x1="${padL}" x2="${W - padR}" y1="${y(v)}" y2="${y(v)}" stroke="var(--grid)" stroke-width="1"/>`;
      s += `<text x="${padL - 6}" y="${y(v) + 3.5}" text-anchor="end" font-size="10" fill="var(--muted-ink)">${fmtK(v)}</text>`;
    }
  }
  const lblEvery = Math.ceil(data.length / 8);
  data.forEach((d, i) => {
    const cx = padL + band * i + band / 2;
    const x = cx - barW / 2;
    const h = Math.abs(y(d.net) - y(0));
    const r = Math.min(4, barW / 2);
    if (h >= 0.5) {
      const col = d.net >= 0 ? "var(--div-pos)" : "var(--div-neg)";
      s += d.net >= 0
        ? `<path d="M${x},${y(0)} v${-Math.max(h - r, 0)} q0,${-r} ${r},${-r} h${barW - 2 * r} q${r},0 ${r},${r} v${Math.max(h - r, 0)} z" fill="${col}"/>`
        : `<path d="M${x},${y(0)} v${Math.max(h - r, 0)} q0,${r} ${r},${r} h${barW - 2 * r} q${r},0 ${r},${-r} v${-Math.max(h - r, 0)} z" fill="${col}"/>`;
    }
    if (i % lblEvery === 0) s += `<text x="${cx}" y="${H - 6}" text-anchor="middle" font-size="10" fill="var(--muted-ink)">${d.label}</text>`;
    s += `<rect class="hit" x="${padL + band * i}" y="${padT}" width="${band}" height="${ih}" fill="transparent"/>`;
  });
  s += `<line x1="${padL}" x2="${W - padR}" y1="${y(0)}" y2="${y(0)}" stroke="var(--axis)" stroke-width="1.5"/></svg>`;
  el.innerHTML = s;
  attachTooltip(el, data, d => `<b>${d.full}</b><br>Netto: <b>${fmtEur(d.net)}</b> ${d.net >= 0 ? "overgehouden" : "tekort"}`);
}

// horizontale staven: uitgaven per categorie (één tint)
function chartCats(el, data) {
  const W = Math.max(320, el.clientWidth || 600);
  const rowH = 30, padT = 4, labW = Math.min(150, W * 0.34), valW = 54;
  const H = padT + data.length * rowH + 4;
  const maxV = Math.max(1, ...data.map(d => d.value));
  const iw = W - labW - valW - 10;
  let s = `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Gemiddelde uitgaven per categorie per maand">`;
  const maxChars = Math.max(8, Math.floor(labW / 7));
  data.forEach((d, i) => {
    const yy = padT + i * rowH + rowH / 2;
    const bw = Math.max(3, (d.value / maxV) * iw);
    const chars = Array.from(d.label);
    const lbl = chars.length > maxChars ? chars.slice(0, maxChars - 1).join("") + "…" : d.label;
    s += `<text x="${labW}" y="${yy + 4}" text-anchor="end" font-size="12" style="fill:var(--secondary-label)">${esc(lbl)}</text>`;
    s += `<path d="M${labW + 8},${yy - 7} h${Math.max(bw - 4, 0)} q4,0 4,4 v6 q0,4 -4,4 h${-Math.max(bw - 4, 0)} z" fill="var(--seq)"/>`;
    s += `<text x="${labW + 8 + bw + 6}" y="${yy + 4}" font-size="12" fill="var(--muted-ink)" font-variant-numeric="tabular-nums">${fmtK(d.value)}</text>`;
    s += `<rect class="hit" x="0" y="${padT + i * rowH}" width="${W}" height="${rowH}" fill="transparent"/>`;
  });
  s += `</svg>`;
  el.innerHTML = s;
  attachTooltip(el, data, d => `<b>${esc(d.label)}</b><br>Gem. <b>${fmtEur(d.value)}</b> per maand`);
}

const byMonthSafe = (a, mk) => a.byMonth.get(mk);
const fullMonth = mk => { const [y, m] = mk.split("-"); return ["januari","februari","maart","april","mei","juni","juli","augustus","september","oktober","november","december"][+m-1] + " " + y; };
const cap = s => s ? s.charAt(0).toUpperCase() + s.slice(1) : s;

/* ----- Plan ----- */
function renderPlan() {
  const el = $("#view-plan");
  const a = analytics();
  const steps = planSteps();
  const buf = bufferAdvice();
  const goalsM = goalsMonthlyTotal();
  const spendable = a.income - a.fixedTotal - goalsM;
  const perWeek = spendable / 4.33;
  const varSpend = Math.max(0, a.avgExpense - a.fixedTotal);
  const diff = spendable - varSpend;

  el.innerHTML = `
    <div class="card">
      <div class="footnote" style="margin-bottom:4px">Vrij te besteden per maand</div>
      <div class="hero ${spendable < 0 ? "neg" : ""}">${fmtEur(spendable)}</div>
      <div class="hero-sub">≈ ${fmtEur(Math.max(0, perWeek))} per week voor boodschappen, uitjes en andere variabele uitgaven</div>
      <div style="height:12px"></div>

      <p class="footnote" style="margin-top:10px">
        Je gaf de afgelopen maanden gemiddeld <b>${fmtEur(varSpend)}</b> uit aan variabele kosten —

          : `dat is <b class="danger">${fmtEur(-diff)} méér</b> dan dit plan toelaat. Kijk bij “Waar gaat het heen?” waar je kunt bijsturen, of verlaag (tijdelijk) je doelen.`}

          <div class="stat">${s.stat}</div>
        </div>
      </div>`).join("")}

const GOAL_TEMPLATES = [
  { kind: "buffer",   name: "Buffer / noodfonds", emoji: "🛟", target: () => bufferAdvice().advies, monthly: null },

  { kind: "kleding",  name: "Kleding & schoenen", emoji: "👕", target: () => 720, monthly: 60 },
  { kind: "vakantie", name: "Vakantie", emoji: "🏖️", target: () => 2000, monthly: 100 },
  { kind: "anders",   name: "Eigen doel", emoji: "⭐", target: () => 1000, monthly: 50 },
];
function renderDoelen() {
  const el = $("#view-doelen");
  const a = analytics();
  const totalM = goalsMonthlyTotal();
  const capacity = a.income - a.fixedTotal - Math.max(0, a.avgExpense - a.fixedTotal);
  el.innerHTML = `
    ${state.goals.length ? `
    <div class="card">
      <div class="budget-row"><span class="l">Totaal opzij te zetten p/m</span><span class="v">${fmtEur(totalM)}</span></div>
      <div class="budget-row"><span class="l">Ruimte bij huidig uitgavenpatroon</span><span class="v ${capacity < totalM ? "neg" : "pos"}">${fmtEur(Math.max(0, capacity))}</span></div>
      ${capacity < totalM ? `<p class="footnote danger" style="margin-top:8px">Je doelen vragen ${fmtEur(totalM - capacity)} p/m meer dan je nu overhoudt — verlaag maandbedragen of bespaar op variabele uitgaven.</p>` : `<p class="footnote" style="margin-top:8px">Dit past binnen wat je gemiddeld overhoudt. 👍</p>`}
    </div>` : ""}

    <div id="goalList">
      ${state.goals.map((g, i) => {
        const pct = Math.min(1, g.target ? g.current / g.target : 0);
        const m = goalMonthly(g);
        const monthsLeft = m > 0 ? Math.ceil(Math.max(0, g.target - g.current) / m) : null;
        const eta = monthsLeft != null ? new Date(new Date().getFullYear(), new Date().getMonth() + monthsLeft, 1) : null;
        return `
        <div class="goal-card" data-i="${i}">
          <div class="goal-top">
            <div class="emoji">${g.emoji}</div>
            <div class="grow">
              <div class="goal-name">${esc(g.name)}</div>
              <div class="goal-meta">${fmtEur(m)} p/m ${eta ? `· klaar rond ${MND[eta.getMonth()]} ${eta.getFullYear()}` : ""}</div>
            </div>
            <button class="small" data-edit="${i}">Wijzig</button>
          </div>
          <div class="meter ${pct >= 1 ? "done" : ""}"><div style="width:${Math.round(pct * 100)}%"></div></div>
          <div class="goal-nums"><span>${fmtEur(g.current)} gespaard</span><span>${Math.round(pct * 100)}% van ${fmtEur(g.target)}</span></div>
        </div>`;
      }).join("")}
    </div>

    <h2 class="sec">${state.goals.length ? "Doel toevoegen" : "Waar wil je voor sparen?"}</h2>
    <p class="footnote" style="margin-bottom:10px">Kies een potje — Grip stelt een bedrag voor op basis van jouw situatie en Nibud-richtlijnen. Je kunt alles aanpassen.</p>
    <div class="tpl-grid">
      ${GOAL_TEMPLATES.map((t, i) => `
        <button class="tpl" data-tpl="${i}"><span class="e">${t.emoji}</span>
          <span>${t.name}<span class="s">richting ${fmtEur(typeof t.target === "function" ? t.target() : t.target)}</span></span>
        </button>`).join("")}
    </div>

    <div id="goalForm"></div>
  `;
  $$(".tpl", el).forEach(b => b.onclick = () => openGoalForm(null, GOAL_TEMPLATES[+b.dataset.tpl]));
  $$("[data-edit]", el).forEach(b => b.onclick = () => openGoalForm(+b.dataset.edit));
}
function openGoalForm(index, tpl) {
  const g = index != null ? state.goals[index] : {
    kind: tpl.kind, name: tpl.name, emoji: tpl.emoji,
    target: Math.round(typeof tpl.target === "function" ? tpl.target() : tpl.target),
    current: tpl.kind === "buffer" ? (state.settings.currentSavings || 0) : 0,
    monthly: Math.round(typeof tpl.monthly === "function" ? tpl.monthly() : (tpl.monthly ?? 0)) || null,
    deadline: null,
  };
  if (index == null && g.kind === "buffer" && !g.monthly) g.monthly = Math.max(50, Math.round((g.target - g.current) / 24 / 5) * 5);
  const f = $("#goalForm");
  f.innerHTML = `
    <h2 class="sec">${index != null ? "Doel wijzigen" : "Nieuw doel"}</h2>
    <div class="list">
      <div class="frow"><label>Naam</label><input type="text" id="gName" value="${esc(g.name)}"></div>
      <div class="frow"><label>Doelbedrag</label><input type="number" id="gTarget" value="${g.target}" min="0" step="50"></div>
      <div class="frow"><label>Al gespaard</label><input type="number" id="gCurrent" value="${g.current}" min="0" step="50"></div>
      <div class="frow"><label>Per maand opzij</label><input type="number" id="gMonthly" value="${g.monthly ?? ""}" placeholder="auto" min="0" step="5"></div>
      <div class="frow"><label>Of klaar vóór<div class="hint">maandbedrag wordt dan berekend</div></label><input type="date" id="gDeadline" value="${g.deadline ?? ""}"></div>
    </div>
    <button class="primary" id="gSave">Bewaar doel</button>
    ${index != null ? `<div style="height:8px"></div><button class="secondary" id="gDel"><span class="danger">Verwijder doel</span></button>` : ""}
  `;
  f.scrollIntoView({ behavior: "smooth", block: "start" });
  $("#gSave").onclick = () => {
    const monthlyRaw = $("#gMonthly").value;
    const upd = {
      ...g,
      name: $("#gName").value.trim() || g.name,
      target: Math.max(0, +$("#gTarget").value || 0),
      current: Math.max(0, +$("#gCurrent").value || 0),
      monthly: monthlyRaw === "" ? null : Math.max(0, +monthlyRaw),
      deadline: $("#gDeadline").value || null,
    };
    if (!upd.monthly && !upd.deadline) upd.monthly = Math.max(10, Math.round((upd.target - upd.current) / 24));
    if (index != null) state.goals[index] = upd; else state.goals.push(upd);
    if (upd.kind === "buffer") state.settings.currentSavings = upd.current;
    save(); renderDoelen(); toast("Doel opgeslagen");
  };
  if (index != null) $("#gDel").onclick = () => { state.goals.splice(index, 1); save(); renderDoelen(); toast("Doel verwijderd"); };
}

}
function renderTxList() {
  const a = analytics();
  let list = a.enriched;
  if (txFilter.month) list = list.filter(t => monthKey(t.date) === txFilter.month);
  if (txFilter.cat) list = list.filter(t => t.cat === txFilter.cat);
  if (txFilter.q) { const q = txFilter.q.toLowerCase(); list = list.filter(t => (t.name + " " + t.desc).toLowerCase().includes(q)); }
  const MAXN = 400;
  const shown = list.slice(0, MAXN);
  let html = "", lastMk = "";
  for (const t of shown) {
    const mk = monthKey(t.date);
    if (mk !== lastMk) {
      if (lastMk) html += "</div>";
      const m = a.byMonth.get(mk);
      html += `<div class="month-hdr">${fullMonth(mk)}${m ? ` · in ${fmtEur(m.income)} / uit ${fmtEur(m.expense)}` : ""}</div><div class="list">`;
      lastMk = mk;
    }
    const d = new Date(t.date + "T12:00:00");
    html += `
      <div class="row">
        <div class="emoji">${CATS[t.cat].emoji}</div>
        <div class="grow">
          <div class="t">${esc(cap(t.name) || t.desc.slice(0, 40))}</div>
          <div class="d" style="display:flex;align-items:center;gap:4px">${d.getDate()} ${MND[d.getMonth()]} · <select class="catSel" data-key="${esc(t.nkey)}" style="background:none;padding:0;font-size:13px;color:var(--accent);max-width:52vw;flex-shrink:1;direction:ltr">
            ${Object.entries(CATS).map(([k, c]) => `<option value="${k}" ${t.cat === k ? "selected" : ""}>${c.label}</option>`).join("")}
          </select></div>
        </div>
        <div class="amt ${t.amount > 0 ? "pos" : ""}">${t.amount > 0 ? "+" : ""}${fmtEur(t.amount, true)}</div>
      </div>`;
  }
  if (lastMk) html += "</div>";
  if (list.length > MAXN) html += `<p class="footnote" style="text-align:center">Eerste ${MAXN} van ${list.length.toLocaleString("nl-NL")} getoond — filter om meer te zien.</p>`;
  if (!list.length) html = `<div class="card"><p class="footnote">Geen transacties gevonden met deze filters.</p></div>`;
  $("#txList").innerHTML = html;
  $$(".catSel").forEach(sel => sel.onchange = () => {
    const key = sel.dataset.key;
    if (key) state.overrides[key] = sel.value;
    save();
    toast(`Categorie aangepast — geldt voor alle transacties van deze partij`);
    renderTxList();
  });
}

  };
}
function exportBackup() {
  const payload = { type: "grip-backup", version: 2, account: session.account.email, envs: store.envs, data: store.data };
  const blob = new Blob([JSON.stringify(payload, null, 1)], { type: "application/json" });
  const aEl = document.createElement("a");
  aEl.href = URL.createObjectURL(blob);
  aEl.download = "grip-backup-" + new Date().toISOString().slice(0, 10) + ".json";
  aEl.click();
  setTimeout(() => URL.revokeObjectURL(aEl.href), 3000);
}

/* ---------- import wiring ---------- */
$("#filePick").addEventListener("change", async e => {
  const files = [...e.target.files];
  if (!files.length) return;
  let added = 0, dupes = 0, failed = [], hadPdf = false;
  if (files.some(f => f.name.toLowerCase().endsWith(".pdf"))) toast("PDF wordt gelezen…");
  for (const f of files) {
    try {
      let parsed;
      if (f.name.toLowerCase().endsWith(".pdf")) {
        hadPdf = true;
        parsed = await parsePdf(await f.arrayBuffer());
      } else {
        parsed = parseFile(f.name, await f.text());
      }
      if (!parsed.length) { failed.push(f.name); continue; }
      const r = importTransactions(parsed);
      added += r.added; dupes += r.dupes;
    } catch (err) { console.error(err); failed.push(f.name + (err && err.message ? ` (${err.message})` : "")); }
  }
  e.target.value = "";
  let msg = `${added.toLocaleString("nl-NL")} transacties toegevoegd`;
  if (dupes) msg += `, ${dupes.toLocaleString("nl-NL")} dubbele overgeslagen`;
  if (failed.length) msg += `. Niet herkend: ${failed.join(", ")}`;
  if (hadPdf && added) msg += ". Tip: PDF-lezen is minder betrouwbaar dan CSV — controleer de aantallen bij Transacties.";
  toast(msg);
  if (added) switchTab("overzicht"); else renderView(activeTab);
});

/* ---------- demo data ---------- */
function mulberry32(a) { return function () { a |= 0; a = (a + 0x6D2B79F5) | 0; let t = Math.imul(a ^ (a >>> 15), 1 | a); t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t; return ((t ^ (t >>> 14)) >>> 0) / 4294967296; }; }
function loadDemo() {
  const rnd = mulberry32(42);
  const R = (a, b) => a + rnd() * (b - a);
  const tx = [];
  const now = new Date();
  const push = (y, m, d, amount, name, desc) => {
    const dt = new Date(y, m, Math.min(d, 28));
    if (dt > now) return;
    tx.push({ date: `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, "0")}-${String(dt.getDate()).padStart(2, "0")}`,
              amount: Math.round(amount * 100) / 100, name, desc, iban: "NL00DEMO0123456789", ctpIban: "" });
  };
  for (let k = 24; k >= 0; k--) {
    const dt = new Date(now.getFullYear(), now.getMonth() - k, 1);
    const y = dt.getFullYear(), m = dt.getMonth();
    push(y, m, 24, 3280 + Math.round(R(-40, 40)), "Werkgever B.V.", "Salaris " + fullMonth(`${y}-${String(m + 1).padStart(2, "0")}`));
    push(y, m, 20, 111, "Belastingdienst Toeslagen", "Zorgtoeslag");
    push(y, m, 1, -1245, "Woningstichting Thuis", "Huur");
    push(y, m, 3, -(165 + Math.round(R(-30, 60))), "Eneco Services", "Termijnbedrag energie");
    push(y, m, 5, -12.5, "Vitens", "Drinkwater voorschot");
    push(y, m, 25, -148.5, "Zilveren Kruis", "Zorgverzekering premie");
    push(y, m, 26, -18.9, "FBTO Verzekeringen", "Inboedel & AVP");
    push(y, m, 12, -52.5, "Ziggo Services", "Internet & TV");
    push(y, m, 14, -22, "Odido Netherlands", "Sim only");
    push(y, m, 8, -13.99, "Netflix International", "Abonnement");
    push(y, m, 9, -10.99, "Spotify AB", "Premium");
    push(y, m, 15, -24.99, "Basic-Fit Nederland", "Sportabonnement");
    const nBood = 9 + Math.floor(R(0, 4));
    for (let i = 0; i < nBood; i++) push(y, m, 2 + Math.floor(R(0, 26)), -R(9, 78), rnd() < 0.7 ? "Albert Heijn" : rnd() < 0.5 ? "Jumbo" : "Lidl", "Betaalautomaat");
    for (let i = 0; i < 2; i++) push(y, m, 6 + Math.floor(R(0, 20)), -R(45, 75), "Shell Station", "Brandstof");
    push(y, m, 27, -64.8, "ANWB Verzekeren", "Autoverzekering");
    if (rnd() < 0.9) push(y, m, 10 + Math.floor(R(0, 15)), -R(25, 70), "Thuisbezorgd.nl", "Bestelling");
    if (rnd() < 0.8) push(y, m, 5 + Math.floor(R(0, 20)), -R(30, 90), "Restaurant De Buurman", "Diner");
    if (rnd() < 0.6) push(y, m, 8 + Math.floor(R(0, 18)), -R(20, 120), rnd() < 0.5 ? "Zalando SE" : "HEMA", "Online aankoop");
    if (rnd() < 0.35) push(y, m, 12, -R(15, 60), "Kruidvat", "Drogisterij");
    if (rnd() < 0.3) push(y, m, 16, -R(11, 30), "Pathé Theatres", "Bioscoop");
    if (m === 1) push(y, m, 15, -R(180, 320), "Gemeente", "Gemeentelijke belastingen");
    if (m === 6) push(y, m, 10, -R(650, 950), "TUI Nederland", "Zomervakantie");
    if (m === 11) push(y, m, 18, -R(150, 350), "Bol.com", "Cadeaus december");
    if (m === 4) push(y, m, 20, 950, "Werkgever B.V.", "Vakantiegeld");
    push(y, m, 26, -250, "Eigen spaarrekening", "Maandelijks sparen spaarrekening");
  }
  importTransactions(tx);
  state.settings.currentSavings = 4300;
  state.settings.housing = "huur";
  state.settings.hasCar = true;
  save();
  switchTab("overzicht");
  toast("Voorbeelddata geladen — vervang dit later door je eigen afschriften");
}

/* ---------- installeren op het beginscherm ---------- */
const isStandalone = window.matchMedia("(display-mode: standalone)").matches || navigator.standalone === true;
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
const INSTALL_DISMISS = "grip.installDismissed.v1";
let deferredPrompt = null;
window.addEventListener("beforeinstallprompt", e => { e.preventDefault(); deferredPrompt = e; renderInstallBanner(); });
window.addEventListener("appinstalled", () => { deferredPrompt = null; $("#installSlot").innerHTML = ""; });
function renderInstallBanner() {
  const slot = $("#installSlot");
  if (isStandalone || localStorage.getItem(INSTALL_DISMISS)) { slot.innerHTML = ""; return; }
  if (!deferredPrompt && !isIOS) { slot.innerHTML = ""; return; }
  slot.innerHTML = `
    <div class="install-banner">
      <img src="icons/icon-180.png" alt="">
      <div class="grow"><div class="t">Grip op je beginscherm</div><div class="s">Eigen icoon, werkt offline</div></div>
      <button class="getbtn" id="btnInstall">Installeer</button>
      <button class="x" id="btnInstDismiss" aria-label="Verberg">✕</button>
    </div>`;
  $("#btnInstall").onclick = async () => {
    if (deferredPrompt) {                  // Android / Chrome: echte installatieprompt
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null; renderInstallBanner();
    } else $("#sheet").classList.add("on"); // iOS: Apple staat alleen de deelknop-route toe
  };
  $("#btnInstDismiss").onclick = () => { localStorage.setItem(INSTALL_DISMISS, "1"); renderInstallBanner(); };
}
$("#sheetClose").onclick = () => $("#sheet").classList.remove("on");
$("#sheet").addEventListener("click", e => { if (e.target.id === "sheet") e.currentTarget.classList.remove("on"); });
renderInstallBanner();
if ("serviceWorker" in navigator && location.protocol === "https:") {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}
</script>
